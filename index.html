
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caltex D'Aguilar - Induction Register</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

.wrap {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

/* KPI */
.kpis {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.kpi {
  background: white;
  padding: 15px;
  border-radius: 10px;
  flex: 1;
  text-align: center;
}

/* Toolbar */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

input, select, button {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #0f4c81;
  color: white;
  cursor: pointer;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #fafafa;
}

/* PRINT STYLES */
@media print {
  body {
    background: white;
  }

  .toolbar, .kpis {
    display: none;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 5px;
  }

  .print-date {
    display: block;
    font-size: 12px;
    margin-bottom: 10px;
  }

  table {
    font-size: 12px;
  }
}

.print-date {
  display: none;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Caltex D'Aguilar - Induction Register</h1>
<div class="print-date" id="printDate"></div>

<div class="kpis">
  <div class="kpi">
    <div>Total Workers</div>
    <h2 id="total"></h2>
  </div>
  <div class="kpi">
    <div>Companies</div>
    <h2 id="companies"></h2>
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search...">
  <select id="companyFilter">
    <option value="">All Companies</option>
  </select>
  <button onclick="window.print()">Print Register</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Phone</th>
<th>Email</th>
<th>Emergency Contact</th>
<th>Emergency Phone</th>
<th>Date</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<script src="data.js"></script>

<script>

const body = document.getElementById("tableBody");
const search = document.getElementById("search");
const filter = document.getElementById("companyFilter");

/* PRINT DATE */
document.getElementById("printDate").innerText =
  "Printed: " + new Date().toLocaleString();

/* FULL NAME */
function fullName(x){
  return `${x["[Full Legal Name] First Name"]} ${x["[Full Legal Name] Last Name"]}`;
}

/* EMERGENCY NAME */
function emergencyName(x){
  return `${x["[Emergency Contact] First Name"]} ${x["[Emergency Contact] Last Name"]}`;
}

/* LOAD COMPANIES */
function loadCompanies(){
  const companies = [...new Set(inductionData.map(x => x["Company Name"]))];

  companies.forEach(c => {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = c;
    filter.appendChild(o);
  });
}

/* RENDER */
function render(){

  const term = search.value.toLowerCase();
  const comp = filter.value;

  body.innerHTML = "";

  const filtered = inductionData.filter(x => {

    const text = `
      ${fullName(x)}
      ${x["Company Name"]}
      ${x["Email"]}
      ${x["Phone Number"]}
      ${x["Emergency Phone Number"]}
    `.toLowerCase();

    return text.includes(term) && (!comp || x["Company Name"] === comp);
  });

  filtered.forEach(x => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${fullName(x)}</td>
      <td>${x["Company Name"]}</td>
      <td>${x["Phone Number"]}</td>
      <td>${x["Email"]}</td>
      <td>${emergencyName(x)}</td>
      <td>${x["Emergency Phone Number"]}</td>
      <td>${x["Submission Date"]}</td>
    `;

    body.appendChild(row);
  });

  document.getElementById("total").innerText = inductionData.length;
  document.getElementById("companies").innerText =
    new Set(inductionData.map(x => x["Company Name"])).size;
}

search.addEventListener("input", render);
filter.addEventListener("change", render);

loadCompanies();
render();

</script>

</body>
</html>
